spring:
  application:
    name: worksync
  profiles:
    active: local
    include: secret

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate   # 운영: validate 권장
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  forward-headers-strategy: framework

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  jwt:
    issuer: worksync
    access-token-exp-minutes: 60
    refresh-token-exp-days: 7
  cors:
    allowed-origins:
      - http://localhost:3000
      - https://worksync.example.com