name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/WorkSync
            git pull origin main

            # 백엔드 빌드
            export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
            cd backend
            ./gradlew clean build -x test

            # 백엔드 재시작
            sudo fuser -k 8080/tcp || true
            nohup env \
              DB_URL="${{ secrets.DB_URL }}" \
              DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              FRONTEND_URL="https://worksync.kr" \
              CORS_ALLOWED_ORIGINS="https://worksync.kr" \
              java -jar build/libs/worksync-0.0.1-SNAPSHOT.jar \
              > /home/ubuntu/backend.log 2>&1 &

            # 프론트엔드 재시작
            sudo fuser -k 3000/tcp || true
            cd /home/ubuntu/WorkSync/frontend
            npm install
            nohup npm run dev -- --host > /home/ubuntu/frontend.log 2>&1 &
